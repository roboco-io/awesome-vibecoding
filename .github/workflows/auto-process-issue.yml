name: Auto Process Issue

on:
  issues:
    types: [opened, labeled]

concurrency:
  group: readme-update
  cancel-in-progress: false

jobs:
  validate-and-process:
    # Run on the initial 'opened' event when the 'addition' label is already
    # present, or on the 'labeled' event when 'addition' is the label that was
    # just applied. This prevents re-runs when the workflow adds its own
    # status labels (invalid/duplicate/rejected/needs-review).
    if: (github.event.action == 'opened' && contains(github.event.issue.labels.*.name, 'addition')) || (github.event.action == 'labeled' && github.event.label.name == 'addition')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate URL
        id: validate
        env:
          ISSUE_BODY: ${{ github.event.issue.body }}
        run: |
          # Extract URL from issue body. Body is passed via env var so that
          # backticks or $() in the issue text cannot be evaluated by the shell.
          URL=$(printf '%s' "$ISSUE_BODY" | grep -oPi 'https?://[^\s)]+' | head -1)

          if [ -z "$URL" ]; then
            echo "status=no_url" >> $GITHUB_OUTPUT
            exit 0
          fi

          echo "url=$URL" >> $GITHUB_OUTPUT

          # Check if URL is reachable
          HTTP_CODE=$(curl -o /dev/null -s -w "%{http_code}" -L --max-time 10 "$URL" || echo "000")
          if [ "$HTTP_CODE" -lt 200 ] || [ "$HTTP_CODE" -ge 400 ]; then
            echo "status=unreachable" >> $GITHUB_OUTPUT
            echo "http_code=$HTTP_CODE" >> $GITHUB_OUTPUT
            exit 0
          fi

          # Check for duplicates in README
          if grep -qF "$URL" README.md; then
            echo "status=duplicate" >> $GITHUB_OUTPUT
            exit 0
          fi

          echo "status=valid" >> $GITHUB_OUTPUT

      - name: Reject - No URL
        if: steps.validate.outputs.status == 'no_url'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: '❌ **Rejected**: No valid URL found in this issue. Please include a URL (https://...) for the resource.\n\nPlease create a new issue using the [Add Resource template](https://github.com/roboco-io/awesome-vibecoding/issues/new?template=add-resource.yml).'
            });
            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              state: 'closed',
              labels: ['invalid']
            });

      - name: Reject - Unreachable URL
        if: steps.validate.outputs.status == 'unreachable'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `❌ **Rejected**: The URL \`${{ steps.validate.outputs.url }}\` is not reachable (HTTP ${{ steps.validate.outputs.http_code }}). Please verify the URL and create a new issue.`
            });
            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              state: 'closed',
              labels: ['invalid']
            });

      - name: Reject - Duplicate
        if: steps.validate.outputs.status == 'duplicate'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `ℹ️ **Already listed**: The URL \`${{ steps.validate.outputs.url }}\` is already in the README. If you want to update the description, please mention that in a new issue.\n\nClosing as duplicate.`
            });
            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              state: 'closed',
              labels: ['duplicate']
            });

      - name: Setup Node.js
        if: steps.validate.outputs.status == 'valid'
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        if: steps.validate.outputs.status == 'valid'
        run: npm ci

      - name: Process with Claude Code SDK
        if: steps.validate.outputs.status == 'valid'
        id: claude
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_BODY: ${{ github.event.issue.body }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: node scripts/auto-process-issue.mjs

      - name: Reject - Quality check failed
        if: steps.validate.outputs.status == 'valid' && steps.claude.outputs.result == 'rejected'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `❌ **Rejected**: ${{ steps.claude.outputs.reason }}\n\nIf you believe this is incorrect, please comment with additional context and a maintainer will review.`
            });
            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              state: 'closed',
              labels: ['rejected']
            });

      - name: Request maintainer review - Uncertain
        if: steps.validate.outputs.status == 'valid' && steps.claude.outputs.result == 'uncertain'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              labels: ['needs-review']
            });
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `🤔 **Needs maintainer review**: ${{ steps.claude.outputs.reason }}\n\n@serithemage Could you take a look? Use \`/approve\` to add or \`/reject [reason]\` to decline.`
            });

      - name: Commit and push
        if: steps.validate.outputs.status == 'valid' && steps.claude.outputs.result == 'processed'
        id: commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git diff --quiet; then
            echo "has_changes=false" >> $GITHUB_OUTPUT
          else
            git add README.md README.ko.md README.ja.md
            git add .cache/awesome-vibecoding.db 2>/dev/null || true
            git commit -m "docs: Add resource from issue #${{ github.event.issue.number }}

          Closes #${{ github.event.issue.number }}
          Generated by Claude Code via GitHub Actions"
            git pull --rebase
            git push
            echo "has_changes=true" >> $GITHUB_OUTPUT
          fi

      - name: Comment on issue
        if: steps.validate.outputs.status == 'valid' && steps.claude.outputs.result == 'processed' && steps.commit.outputs.has_changes == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.issue.number,
              body: '✅ **Added!** The resource has been added to the README with Korean and Japanese translations. Thank you for your contribution!'
            });

      - name: Close issue
        if: steps.validate.outputs.status == 'valid' && steps.claude.outputs.result == 'processed' && steps.commit.outputs.has_changes == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.issue.number,
              state: 'closed'
            });

      - name: Request review if no changes
        if: steps.validate.outputs.status == 'valid' && steps.claude.outputs.result == 'processed' && steps.commit.outputs.has_changes == 'false'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              labels: ['needs-review']
            });
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: '⚠️ **Needs manual review**: The automated system could not make changes.\n\n@serithemage Could you take a look? Use `/approve` to add or `/reject [reason]` to decline.'
            });
