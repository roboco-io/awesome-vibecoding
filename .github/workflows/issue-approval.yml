name: Issue Manual Review Handler

on:
  issue_comment:
    types: [created]

concurrency:
  group: readme-update
  cancel-in-progress: false

jobs:
  handle-approve:
    # /approve - Force add a resource that auto-processing couldn't handle
    if: |
      github.event.issue.pull_request == null &&
      github.event.comment.user.login == 'serithemage' &&
      contains(github.event.comment.body, '/approve')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write

    steps:
      - name: Acknowledge approval
        uses: actions/github-script@v9
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: '✅ Manual approval received. Processing...'
            });

      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Install dependencies
        run: npm ci

      - name: Process Issue and Update README
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_BODY: ${{ github.event.issue.body }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: node scripts/issue-approval.mjs

      - name: Commit and push changes
        id: commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git diff --quiet; then
            echo "has_changes=false" >> $GITHUB_OUTPUT
          else
            git add README.md README.ko.md README.ja.md
            git add .cache/awesome-vibecoding.db 2>/dev/null || true
            git commit -m "docs: Add resource from issue #${{ github.event.issue.number }} (manual approve)

          Closes #${{ github.event.issue.number }}
          Generated by Claude Code via GitHub Actions"
            git pull --rebase
            git push
            echo "has_changes=true" >> $GITHUB_OUTPUT
          fi

      - name: Close issue on success
        if: steps.commit.outputs.has_changes == 'true'
        uses: actions/github-script@v9
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: '🎉 Resource has been added to README and translations updated.'
            });
            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              state: 'closed'
            });

      - name: Comment on failure
        if: steps.commit.outputs.has_changes == 'false'
        uses: actions/github-script@v9
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: '⚠️ No changes were made. The resource may already exist or the issue format was not recognized.'
            });

  handle-reject:
    # /reject - Close issue with reason
    if: |
      github.event.issue.pull_request == null &&
      github.event.comment.user.login == 'serithemage' &&
      contains(github.event.comment.body, '/reject')
    runs-on: ubuntu-latest
    permissions:
      issues: write

    steps:
      - name: Reject and close
        uses: actions/github-script@v9
        with:
          script: |
            const comment = context.payload.comment.body;
            const reason = comment.replace('/reject', '').trim() || 'Does not meet curation criteria.';
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `❌ **Rejected by maintainer**: ${reason}\n\nThank you for your suggestion!`
            });
            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              state: 'closed'
            });
