name: Issue Approval Handler

on:
  issue_comment:
    types: [created]

jobs:
  check-approval:
    # Only run when:
    # 1. Comment is on an issue (not a PR)
    # 2. Commenter is the repository owner
    # 3. Comment contains approval keyword
    if: |
      github.event.issue.pull_request == null &&
      github.event.comment.user.login == 'serithemage' &&
      contains(github.event.comment.body, '/approve')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write

    steps:
      - name: Acknowledge approval
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: '✅ Approval received! Processing the resource addition...'
            });

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code

      - name: Process Issue and Update README
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          ISSUE_TITLE="${{ github.event.issue.title }}"
          ISSUE_BODY="${{ github.event.issue.body }}"
          ISSUE_NUMBER="${{ github.event.issue.number }}"

          PROMPT=$(cat .github/prompts/issue-approval.md)

          claude -p "
          $PROMPT

          ## Issue Details

          **Issue #$ISSUE_NUMBER**: $ISSUE_TITLE

          **Issue Body**:
          $ISSUE_BODY

          Process this issue and add the resource to README.md, then translate to Korean and Japanese.
          " --allowedTools "Edit,Read,Glob,Grep,Write,Bash(git status)" \
            --max-turns 30

      - name: Commit and push changes
        id: commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git diff --quiet; then
            echo "has_changes=false" >> $GITHUB_OUTPUT
          else
            git add README.md README.ko.md README.ja.md
            git commit -m "docs: Add resource from issue #${{ github.event.issue.number }}

          Closes #${{ github.event.issue.number }}
          Generated by Claude Code via GitHub Actions"
            git push
            echo "has_changes=true" >> $GITHUB_OUTPUT
          fi

      - name: Close issue and comment
        if: steps.commit.outputs.has_changes == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: '🎉 Resource has been added to README and translations updated. Closing this issue.'
            });
            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              state: 'closed'
            });

      - name: Comment on failure (no changes)
        if: steps.commit.outputs.has_changes == 'false'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: '⚠️ No changes were made. The resource may already exist or the issue format was not recognized. Please check the issue content and try again.'
            });
