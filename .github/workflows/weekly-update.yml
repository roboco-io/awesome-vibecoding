name: Weekly README Update

on:
  schedule:
    # Run every Sunday at 00:00 UTC
    - cron: '0 0 * * 0'
  workflow_dispatch:
    inputs:
      category:
        description: 'Category to update (all, ide, agentic, cloud, learning)'
        required: false
        default: 'all'
      force:
        description: 'Force update even if updated within the last week'
        required: false
        type: boolean
        default: false
      force_refresh:
        description: 'Force refresh all caches (ignore TTL)'
        required: false
        type: boolean
        default: false

concurrency:
  group: readme-update
  cancel-in-progress: false

jobs:
  update-readme:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Check for recent updates
        id: check
        run: |
          FORCE="${{ github.event.inputs.force || 'false' }}"
          if [ "$FORCE" = "true" ]; then
            echo "skip=false" >> $GITHUB_OUTPUT
            echo "Force update requested, skipping recency check"
            exit 0
          fi

          # Check if README.md was updated in the last 7 days (excluding bot commits)
          LAST_UPDATE=$(git log -1 --format="%ct" --diff-filter=M -- README.md)
          NOW=$(date +%s)
          DAYS_AGO=$(( (NOW - LAST_UPDATE) / 86400 ))

          echo "Last README.md update: $DAYS_AGO days ago"

          if [ "$DAYS_AGO" -lt 7 ]; then
            echo "skip=true" >> $GITHUB_OUTPUT
            echo "Skipping: README.md was updated $DAYS_AGO days ago (< 7 days)"
          else
            echo "skip=false" >> $GITHUB_OUTPUT
            echo "Proceeding: README.md was last updated $DAYS_AGO days ago"
          fi

      - name: Setup Node.js
        if: steps.check.outputs.skip != 'true'
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Install dependencies
        if: steps.check.outputs.skip != 'true'
        run: npm ci

      - name: Run Claude Code Update
        if: steps.check.outputs.skip != 'true'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          PERPLEXITY_API_KEY: ${{ secrets.PERPLEXITY_API_KEY }}
          CATEGORY: ${{ github.event.inputs.category || 'all' }}
          FORCE_REFRESH: ${{ github.event.inputs.force_refresh || 'false' }}
        run: node scripts/weekly-update.mjs

      - name: Commit and push changes
        if: steps.check.outputs.skip != 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git diff --quiet; then
            echo "No changes to commit"
          else
            git add README.md README.ko.md README.ja.md .cache/awesome-vibecoding.db
            git commit -m "chore: Weekly README update via Claude Code

          - Researched new AI coding tools via Perplexity
          - Added new entries to relevant sections
          - Updated translations (Korean, Japanese)

          Generated by Claude Code via GitHub Actions (run ${{ github.run_id }})"
            git push
          fi
