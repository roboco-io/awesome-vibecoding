name: Weekly README Update

on:
  schedule:
    # Run every Sunday at 00:00 UTC
    - cron: '0 0 * * 0'
  workflow_dispatch:
    inputs:
      category:
        description: 'Category to update (all, ide, agentic, cloud, learning)'
        required: false
        default: 'all'

jobs:
  update-readme:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code

      - name: Run Claude Code Update
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          PERPLEXITY_API_KEY: ${{ secrets.PERPLEXITY_API_KEY }}
        run: |
          CATEGORY="${{ github.event.inputs.category || 'all' }}"
          PROMPT=$(cat .github/prompts/weekly-update.md)

          claude -p "
          $PROMPT

          Category filter for this run: $CATEGORY
          - If 'all': Update all categories
          - If specific: Only update that category

          Start by reading README.md, then use Perplexity to research each category.
          " --allowedTools "Edit,Read,Glob,Grep,Write,mcp__perplexity-ask__perplexity_ask,Bash" \
            --max-turns 50

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git diff --quiet; then
            echo "No changes to commit"
          else
            git add README.md README.ko.md README.ja.md
            git commit -m "chore: Weekly README update via Claude Code

          - Researched new AI coding tools via Perplexity
          - Added new entries to relevant sections
          - Updated translations (Korean, Japanese)

          Generated by Claude Code via GitHub Actions (run ${{ github.run_id }})"
            git push
          fi
